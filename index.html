<!DOCTYPE html>
<html>
<head>
    <title>Kids Learning App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🐱 Smart Kids App</h1>

<!-- Cat Guide -->
<div class="cat-box">
    <p id="catText">Hi! I am your learning cat 😺 Let's learn!</p>
    <button onclick="talkCat()">Talk to Cat</button>
</div>

<!-- Screen Time -->
<div class="box">
    <h2>Screen Time</h2>
    <p id="time">0 sec</p>
</div>

<!-- Learning Game -->
<div class="box">
    <h2>Math Game</h2>
    <p id="question"></p>
    <input type="number" id="answer">
    <button onclick="checkAnswer()">Submit</button>
    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
